name: 3-Tier App CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: bhavani201997
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            bhavani201997/3tier-frontend:${{ github.sha }}
            bhavani201997/3tier-frontend:latest

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            bhavani201997/3tier-backend:${{ github.sha }}
            bhavani201997/3tier-backend:latest

      - name: Summary
        run: |
          echo "✅ Frontend pushed → bhavani201997/3tier-frontend:latest"
          echo "✅ Backend  pushed → bhavani201997/3tier-backend:latest"
